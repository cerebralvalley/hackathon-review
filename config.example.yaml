# hackathon-reviewer configuration
# Copy to config.yaml and customize for your hackathon.

# CSV column mapping -- map your CSV headers to expected fields.
# Only team_name, github_url, and video_url are required.
columns:
  team_name: "Team Name"
  team_members: "Team Members"
  project_name: "Project Name"
  description: "Project Description"
  github_url: "Public GitHub Repository"
  video_url: "Demo Video"
  # Any additional columns you want preserved in reports:
  # extra:
  #   - "Thoughts and feedback on building with Opus 4.6"

# Code review LLM provider
code_review:
  provider: "anthropic"          # "anthropic" or "gemini"
  model: "claude-opus-4-6"       # model name for the provider
  max_tokens: 2000               # max output tokens per review
  max_source_chars: 20000        # cap on source code sent to the LLM

  # Hackathon-specific context prepended to the review prompt.
  # Tells the LLM what this hackathon is about so it can judge accordingly.
  # prompt_preamble: >
  #   Projects must build RL environments using OpenEnv (0.2.1)
  #   deployed on HuggingFace Spaces.

  # Narrative sections the LLM writes in its review.
  # Omit to use generic defaults (What it does, Architecture, AI Integration,
  # Depth & Execution, Demo Assessment).
  # review_sections:
  #   - name: "What it does"
  #     instruction: "1-2 sentences describing the project"
  #   - name: "Architecture"
  #     instruction: "2-3 sentences on technical architecture and design decisions"
  #   - name: "AI Integration"
  #     instruction: "2-4 sentences on how they use AI/LLMs"
  #   - name: "Depth & Execution"
  #     instruction: "2-3 sentences on engineering quality and deployment"
  #   - name: "Demo Assessment"
  #     instruction: "1-2 sentences based on the transcript"

# Video analysis provider (Gemini native video upload)
video_analysis:
  provider: "gemini"
  model: "gemini-3-flash-preview"
  max_video_duration: 300        # trim videos longer than this (seconds)

  # Extra scoring criteria the video analysis should evaluate.
  # These should be keys from your scoring.criteria section.
  # The video analysis always scores "demo" by default; list any additional
  # criteria that benefit from watching the video (e.g. storytelling, presentation).
  # score_criteria:
  #   - "storytelling"

# Static analysis pattern detection
# Presets: "general" (SDK detection only), "ai_hackathon" (AI/LLM focused),
#          "openenv" (RL environments, HuggingFace, training pipelines)
# static_analysis:
#   pattern_preset: "general"
#   extra_patterns:              # add custom patterns on top of the preset
#     my_framework:
#       patterns: ["import my_framework", "from my_framework"]
#       weight: 3
#       description: "My custom framework usage"

# Hackathon-specific settings (all optional -- omit this section for generic use)
# hackathon:
#   name: "My Hackathon"
#   deadline_utc: "2026-02-16T20:00:00"
#   grace_period_minutes: 15
#   start_date: "2026-02-10"
#   end_date: "2026-02-16"
#   verify_git_period: true

# Scoring rubric (optional -- omit to skip scoring and just generate reports)
# scoring:
#   criteria:
#     impact:
#       weight: 0.25
#       description: "Real-world potential, who benefits, product viability"
#     ai_use:
#       weight: 0.25
#       description: "Creativity and depth of AI/LLM integration (maps to LLM 'AI Use' score)"
#     depth:
#       weight: 0.20
#       description: "Engineering quality, iteration, craft"
#     demo:
#       weight: 0.30
#       description: "Demo quality, working product, presentation"

# Concurrency settings
concurrency:
  clone_workers: 4
  video_download_workers: 4
  llm_concurrent_requests: 3
